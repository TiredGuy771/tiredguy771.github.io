<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Maintenance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 4rem;
            color: #fbbf24;
            margin-bottom: 1rem;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
        }
        p {
            color: #4b5563;
            margin-bottom: 1.5rem;
        }
        #bypassForm {
            margin-top: 1.5rem;
        }
        #bypassCode {
            padding: 0.5rem;
            margin-right: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }
        #bypassSubmit {
            padding: 0.5rem 1rem;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #bypassSubmit:hover {
            background-color: #059669;
        }
        #bypassMessage {
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🚧</div>
        <h1>Website Under Maintenance</h1>
        <p>We're currently performing some scheduled maintenance. We'll be back up shortly. Thank you for your patience!</p>
        <form id="bypassForm">
            <input type="password" id="bypassCode" placeholder="Enter bypass code" required>
            <button type="submit" id="bypassSubmit">Bypass</button>
        </form>
        <p id="bypassMessage"></p>
    </div>

    <script>
        document.getElementById('bypassForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const bypassCode = document.getElementById('bypassCode').value;
            const bypassMessage = document.getElementById('bypassMessage');
            
            // Replace 'your_secret_code' with your actual bypass code
            if (bypassCode === '4896') {
                bypassMessage.textContent = 'Access granted. Redirecting...';
                bypassMessage.style.color = 'green';
                // Replace '/dashboard' with the URL you want to redirect to after successful bypass
                setTimeout(() => window.location.href = 'tiredguy771.github.io/main', 2000);
            } else {
                bypassMessage.textContent = 'Invalid bypass code. Please try again.';
                bypassMessage.style.color = 'red';
            }
        });
    </script>
</body>
</html>
