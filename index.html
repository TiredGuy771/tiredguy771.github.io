<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        #status {
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting</h1>
        <p>Checking redirect condition...</p>
        <p id="status"></p>
    </div>

    <script>

let MaintenanceIsTrue = true;

window.onload = function() {
    if (MaintenanceIsTrue) {
       // If the variable is true, redirect to the maintenance page
        window.location.href = "/maintenance/index.html";
    } else {
       
        // If the variable is false, redirect to the main page
        window.location.href = "/Portfolio/index.html";
    }
};
    </script>
</body>
</html>
